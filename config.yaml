# Path configurations
paths:
  # ── NSD raw input directories ──
  # Each *_dir should contain subjXX/ subdirectories underneath.

  # Brain masks — contains subjXX/func1pt8mm/brainmask.nii.gz
  brain_mask_dir: "/path/to/nsddata/ppdata"

  # ROI label volumes — contains subjXX/func1pt8mm/roi/*.nii.gz (including nsdgeneral.nii.gz)
  roi_label_dir: "/path/to/nsddata/ppdata"

  # MNI transforms — contains subjXX/transforms/MNI-to-func1pt8.nii.gz
  transforms_dir: "/path/to/nsddata/ppdata"

  # Beta sessions — contains subjXX/func1pt8mm/betas_fithrf_GLMdenoise_RR/betas_session*.nii.gz
  betas_dir: "/path/to/nsddata_betas/ppdata"

  # Experiment design matrix (single .mat file)
  expdesign_mat: "/path/to/nsd_expdesign.mat"

  # Stimulus images — contains S{subject}_stimuli_227.h5py
  stimuli_dir: "/path/to/nsd_stimuli"

  # ── Output directories ──
  data_root: "/path/to/processed_nsd"
  save_root: "/path/to/nrf_runs"

  # Processed output layout under data_root/<dirname>/subjXX/.
  avg_response_dirname: "roi_response_average"
  coordinate_dirname: "MNI_coordinate"
  roi_masks_dirname: "roi_masks"
  roi_response_dirname: "roi_response"
  image_order_filename: "image_order.npy"
  validation_idx_filename: "validation_idx.npy"

